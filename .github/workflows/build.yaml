name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: quay.io/redhat-consulting-services/ocp-support-web
  BUILDER_IMAGE: registry.redhat.io/ubi9/go-toolset:latest
  RUNTIME_IMAGE: registry.redhat.io/openshift4/ose-cli-rhel9:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Red Hat registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USER }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              echo "${TAG}"
              echo "latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "tags=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.version.outputs.tags }}
          containerfiles: ./Containerfile
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}
            RUNTIME_IMAGE=${{ env.RUNTIME_IMAGE }}
            APP_VERSION=${{ steps.version.outputs.version }}

      - name: Log in to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      - name: Push to Quay.io
        if: github.event_name == 'push'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ocp-support-web
          registry: quay.io/redhat-consulting-services
          tags: ${{ steps.version.outputs.tags }}

      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
